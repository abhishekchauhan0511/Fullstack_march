<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block and Inline </title>
    <style>
        div{border:2px solid black;
             height:40px;
             width:100px;
            padding: 20px;
        margin-bottom: 20px;
        }  
        span{border:2px solid red;
             height:40px;
             width:100px;
             padding: 20px;
             margin-top: 40px;
        } 
        p{border:2px solid green;
             height:40px;
             width:100px;
             display: inline;
             }
        i{border:2px solid blue;
             height:40px;
             width:100px;     
             display: block;
        }
         </style>
</head>
<body>
   <div>block level element</div>
   <span>inline element</span> 


   <p>Lorem ipsum dolor sit amet.</p>
   <i>Lorem ipsum dolor sit amet.</i>
   
</body>
</html>
