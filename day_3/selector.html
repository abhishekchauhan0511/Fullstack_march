<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selectors in CSS</title>
    <link rel="stylesheet" href="selector.css">
</head>
<body>
    <div>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Incidunt, deleniti.</div>
    <div class="div2">this is another statement</div>
    <div class="div2">this is the third statement</div>
    <div id="div4">this is the fourth statement</div>


    <b>bold tag</b>
    <i>italic tag</i>
    <del>delete tag</del>
    <mark id="mark1">marked text</mark>
    <span class="span"></span>
</body>
</html>
<!---- selectors: are used to select the element to style>
