<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form2</title>
</head>
<body>
     
    <form action="" method="" target=""></form>
  <fieldset>
     <legend>Basic Info</legend>
     <label for="userName">User Name:</label>
     <input type="text" id="userName" name="userName">
        <br><br>
     <label for="fatherName">Father's Name:</label>
     <input type="text" id="fatherName" name="fatherName">
        <br><br>
     <label for="motherName">Mother's Name:</label>
     <input type="text" id="motherName" name="motherName"><br><br>

     <label for="dob">Date of Birth:</label>
     <input type="date" id="dob" name="dob"><br><br>
     <label for="age">Age:</label>
     <input type="number" id="age" name="age" min="18" max="25"><br><br>
     <label for="gender">Gender:</label>
        <input  type="radio" id="male" name="gender" id="gender" value="male">Male
        <input  type="radio" id="female" name="gender" id="gender" value="female">Female
        <input  type="radio" id="other" name="gender" id="gender" value="other">Others  <br><br>
  </fieldset>

  <fieldset>
        <legend>Contact Info</legend>
  </fieldset>

   <fieldset>
        <legend>Contact Info</legend>
        <label for="photo">Photo</label>
        <input type="file" id="photo" name="photo" accept="image/*"><br><br>
        <label for="email">Email</label>
        <input type="email" id="email" name="email"><br><br>

        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone"><br><br>
        <label for="Linkedin">Linkedin Url</label>
        <input type="url" id="Linkedin" name="Linkedin"><br><br>
        <label for="address">Address</label>
        <textarea name="address" id="address" rows="5" cols="20"></textarea>
       <button type="submit">Submit</button>
       <button type="reset">Reset</button>
</body>
</html>
